<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ruleta Milenio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#F9A825;--bg:#080808}
html,body{height:100%;background:var(--bg);font-family:'Barlow Condensed',sans-serif;color:#FFF8E7;overflow:hidden;touch-action:manipulation}
body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:4px;min-height:100dvh;padding:0 16px 8px;background:radial-gradient(ellipse at 50% 0%,rgba(249,168,37,.18) 0%,transparent 65%),radial-gradient(ellipse at 0% 100%,rgba(211,47,47,.15) 0%,transparent 55%),#080808}
.header{text-align:center;width:100%}
.logo-img{width:min(60vw,240px);height:auto;margin-bottom:4px;filter:drop-shadow(0 0 12px rgba(249,168,37,.4))}
.tagline{font-size:clamp(16px,5vw,22px);color:#fff;letter-spacing:.18em;text-transform:uppercase;font-weight:700;margin:0}
.wheel-wrap{position:relative;width:min(82vw,320px);height:min(82vw,320px);flex-shrink:0}
canvas#wheel{width:100%;height:100%;border-radius:50%;filter:drop-shadow(0 0 28px rgba(249,168,37,.35))}
.pointer{position:absolute;top:6px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;border-top:30px solid var(--gold);filter:drop-shadow(0 4px 8px rgba(0,0,0,.6));z-index:10}
.pointer::after{display:none}
.center-cap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:64px;height:64px;background:#0A0A0A;border-radius:50%;border:3px solid var(--gold);z-index:10;display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(249,168,37,.5);padding:6px}
.spin-btn{width:min(80vw,320px);padding:16px 0;background:linear-gradient(135deg,var(--gold) 0%,#ffcc02 50%,var(--gold) 100%);color:#1a0a00;font-family:'Barlow Condensed',sans-serif;font-size:clamp(18px,5vw,22px);font-weight:700;letter-spacing:.12em;text-transform:uppercase;border:none;border-radius:50px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 6px 24px rgba(249,168,37,.45);margin-top:4px;-webkit-tap-highlight-color:transparent}
.spin-btn:active{transform:scale(.96)}
.spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* OVERLAY BASE */
.overlay-base{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;overflow-y:auto}
.overlay-base.show{opacity:1;pointer-events:all}

/* FORM */
#formOverlay{background:rgba(0,0,0,.97)}
.form-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);margin-bottom:4px;text-align:center}
.form-sub{font-size:13px;color:rgba(255,255,255,.45);text-align:center;margin-bottom:24px;letter-spacing:.05em}
.form-group{width:100%;max-width:320px;margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:5px}
.form-input,.form-select{width:100%;background:#111;border:1px solid #333;border-radius:10px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:17px;padding:11px 14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.form-input:focus,.form-select:focus{border-color:var(--gold)}
.form-select option{background:#111;color:#fff}
.form-btn{width:100%;max-width:320px;padding:15px;background:linear-gradient(135deg,var(--gold),#ffcc02);color:#1a0a00;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:50px;cursor:pointer;margin-top:6px}
.form-error{color:#ef5350;font-size:11px;margin-top:3px;min-height:14px}

/* RESULT */
#resultOverlay{background:rgba(0,0,0,.9)}
.result-icon{font-size:64px;margin-bottom:12px;animation:pop .5s cubic-bezier(.34,1.56,.64,1) both}
.result-title{font-family:'Playfair Display',serif;font-size:clamp(24px,7vw,36px);font-weight:900;text-align:center;line-height:1.15;margin-bottom:10px;animation:pop .5s .1s cubic-bezier(.34,1.56,.64,1) both}
.result-title.win{background:linear-gradient(135deg,var(--gold),#fff5cc,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-title.lose{color:rgba(255,255,255,.75)}
.result-sub{font-size:clamp(13px,4vw,16px);color:rgba(255,248,231,.6);text-align:center;margin-bottom:28px;animation:pop .5s .2s cubic-bezier(.34,1.56,.64,1) both}
.again-btn{padding:13px 40px;background:transparent;border:2px solid var(--gold);color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border-radius:50px;cursor:pointer;animation:pop .5s .3s cubic-bezier(.34,1.56,.64,1) both}

/* ADMIN PIN */
#pinOverlay{background:rgba(0,0,0,.98);z-index:200}
.pin-title{font-size:18px;color:var(--gold);margin-bottom:20px;letter-spacing:.1em}
.pin-input{background:#111;border:1px solid var(--gold);border-radius:12px;color:#fff;font-size:28px;text-align:center;padding:12px 24px;width:180px;letter-spacing:.3em;margin-bottom:12px;outline:none}
.pin-btn{padding:12px 40px;background:var(--gold);color:#1a0a00;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;border:none;border-radius:50px;cursor:pointer;margin-bottom:8px}
.pin-cancel{background:none;border:none;color:rgba(255,255,255,.4);font-size:13px;cursor:pointer}
.pin-error{color:#ef5350;font-size:13px;margin-bottom:8px;min-height:16px}

/* ADMIN PANEL */
#adminOverlay{background:rgba(0,0,0,.97);z-index:190;justify-content:flex-start;padding-top:24px}
.admin-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);margin-bottom:16px}
.admin-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:360px;margin-bottom:16px}
.stat-card{background:#111;border:1px solid #333;border-radius:12px;padding:14px;text-align:center}
.stat-num{font-size:32px;font-weight:700;color:var(--gold);line-height:1}
.stat-label{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.admin-log{width:100%;max-width:360px;background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:10px;max-height:240px;overflow-y:auto;margin-bottom:12px}
.log-item{padding:7px 0;border-bottom:1px solid #1a1a1a;font-size:12px}
.log-item:last-child{border-bottom:none}
.log-prize{color:var(--gold);font-weight:600}
.log-lose{color:rgba(255,255,255,.35)}
.log-time{color:rgba(255,255,255,.35);font-size:10px}
.admin-btn{width:100%;max-width:360px;padding:13px;border-radius:50px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-bottom:8px;border:none}
.btn-reset{background:#B71C1C;color:#fff}
.btn-export{background:#1565C0;color:#fff}
.btn-close{background:transparent;border:1px solid #444!important;color:rgba(255,255,255,.6)}

/* CONFETTI */
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
.particle{position:absolute;width:8px;height:8px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes pop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
</style>
</head>

<script>
// ── WHEEL ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const SIZE = 720, CX = 360, CY = 360, R = 350;

const segments = [
  {label:"¡Ganaste\nun Milenio!",win:true, color:"#D32F2F"},
  {label:"Seguí\nparticipando",win:false,color:"#1B5E20"},
  {label:"¡Ganaste\nun Milenio!",win:true, color:"#F9A825"},
  {label:"Seguí\nparticipando",win:false,color:"#1565C0"},
  {label:"¡Ganaste\nun Milenio!",win:true, color:"#6A1B9A"},
  {label:"¡Ganaste\nun Milenio!",win:true, color:"#B71C1C"},
  {label:"¡Ganaste\nun Milenio!",win:true, color:"#2E7D32"},
  {label:"¡Ganaste\nun Milenio!",win:true, color:"#E65100"},
];
const N = segments.length;
const ARC = (2*Math.PI)/N;
const winIndices = segments.map((s,i)=>s.win?i:-1).filter(i=>i>=0);

let currentAngle = 0;
let spinning = false;
let currentParticipant = null;

const logoImage = new Image();
logoImage.src = document.querySelector('.center-cap img').src;

function drawWheel(angle) {
  ctx.clearRect(0,0,SIZE,SIZE);
  ctx.beginPath();
  ctx.arc(CX,CY,R+8,0,2*Math.PI);
  ctx.strokeStyle='#F9A825';
  ctx.lineWidth=6;
  ctx.stroke();

  segments.forEach((seg,i)=>{
    const start=angle+i*ARC, end=start+ARC, mid=start+ARC/2;
    ctx.beginPath();
    ctx.moveTo(CX,CY);
    ctx.arc(CX,CY,R,start,end);
    ctx.closePath();
    ctx.fillStyle=seg.color;
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.3)';
    ctx.lineWidth=1.5;
    ctx.stroke();

    ctx.save();
    ctx.translate(CX,CY);
    ctx.rotate(mid);
    ctx.textAlign='right';
    ctx.fillStyle='#fff';
    ctx.font="bold 26px 'Barlow Condensed',sans-serif";
    ctx.shadowColor='rgba(0,0,0,.7)';
    ctx.shadowBlur=4;
    const lines=seg.label.split('\n');
    lines.forEach((ln,li)=>{
      ctx.fillText(ln, R-18, -((lines.length-1)*12)+(li*26));
    });

    // Logo en porcion
    ctx.drawImage(logoImage, R*0.45-45, -15, 90, 30);

    ctx.restore();
  });

  ctx.beginPath();
  ctx.arc(CX,CY,36,0,2*Math.PI);
  ctx.fillStyle='#0A0A0A';
  ctx.fill();
}

logoImage.onload = () => { drawWheel(0); showForm(); };
logoImage.onerror = () => { drawWheel(0); showForm(); };

function doSpin() {
  if (spinning) return;
  spinning = true;
  

  const winIdx = winIndices[Math.floor(Math.random()*winIndices.length)];
  const targetSegMid = winIdx*ARC + ARC/2;
  const fullSpins = (6+Math.floor(Math.random()*4))*2*Math.PI;
  const targetAngle = -Math.PI/2 - targetSegMid;
  const normCurrent = ((currentAngle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
  const normTarget  = ((targetAngle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
  let delta = normTarget - normCurrent;
  if (delta<=0) delta+=2*Math.PI;
  const totalRot = fullSpins+delta;
  const duration = 4000+Math.random()*1200;
  const startTime = performance.now();
  const startAngle = currentAngle;

  function ease(t){return 1-Math.pow(1-t,4);}
  function animate(now){
    const t = Math.min((now-startTime)/duration,1);
    currentAngle = startAngle+totalRot*ease(t);
    drawWheel(currentAngle);
    if(t<1){requestAnimationFrame(animate);}
    else{
      currentAngle=startAngle+totalRot;
      drawWheel(currentAngle);
      spinning=false;
      setTimeout(()=>showResult(true),400);
    }
  }
  requestAnimationFrame(animate);
}

// ── FORM ───────────────────────────────────────────────────────────────────
function showForm() {
  document.getElementById('fNombre').value='';
  document.getElementById('fMarca').value='';
  document.getElementById('fVariedad').value='';
  document.getElementById('variedadGroup').style.display='none';
  document.getElementById('fGenero').value='';
  document.getElementById('fEdad').value='';
  document.getElementById('eNombre').textContent='';
  document.getElementById('eMarca').textContent='';
  document.getElementById('eGenero').textContent='';
  document.getElementById('eEdad').textContent='';
  document.getElementById('formOverlay').classList.add('show');
}

function hideForm() {
  document.getElementById('formOverlay').classList.remove('show');
}

document.getElementById('fMarca').addEventListener('change', function(){
  const show = this.value && this.value !== 'Tabaco suelto';
  document.getElementById('variedadGroup').style.display = show ? 'block' : 'none';
  if(!show) document.getElementById('fVariedad').value='';
});

document.getElementById('formSubmitBtn').addEventListener('click', function(){
  const nombre = document.getElementById('fNombre').value.trim();
  const genero = document.getElementById('fGenero').value;
  const edad   = parseInt(document.getElementById('fEdad').value);
  let ok = true;
  document.getElementById('eNombre').textContent='';
  document.getElementById('eMarca').textContent='';
  document.getElementById('eGenero').textContent='';
  document.getElementById('eEdad').textContent='';
  const marca = document.getElementById('fMarca').value;
  const variedad = document.getElementById('fVariedad').value.trim();
  document.getElementById('eMarca').textContent='';
  if(!nombre){document.getElementById('eNombre').textContent='Ingresá tu nombre';ok=false;}
  if(!genero){document.getElementById('eGenero').textContent='Seleccioná una opción';ok=false;}
  if(!edad||edad<18||edad>99){document.getElementById('eEdad').textContent='Ingresá una edad válida';ok=false;}
  if(!marca){document.getElementById('eMarca').textContent='Seleccioná una marca';ok=false;}
  if(!ok) return;
  currentParticipant={nombre,genero,edad,marca,variedad};
  hideForm();
  setTimeout(doSpin, 200);
});



// ── RESULT ─────────────────────────────────────────────────────────────────
function showResult(win) {
  registerSpin(win);
  document.getElementById('rIcon').textContent='🎉';
  document.getElementById('rTitle').textContent='¡Ganaste un paquete de Milenio!';
  document.getElementById('rTitle').className='result-title win';
  document.getElementById('rSub').textContent='Acercate al promotor para reclamar tu premio.';
  document.getElementById('resultOverlay').classList.add('show');
  launchConfetti();
}

document.getElementById('againBtn').addEventListener('click', function(){
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('confettiWrap').innerHTML='';
  
  setTimeout(showForm, 200);
});

// ── CONFETTI ───────────────────────────────────────────────────────────────
function launchConfetti(){
  const wrap=document.getElementById('confettiWrap');
  wrap.innerHTML='';
  const colors=['#D32F2F','#2E7D32','#F9A825','#1565C0','#6A1B9A','#fff','#FFD700'];
  for(let i=0;i<80;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'vw';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.width=(6+Math.random()*8)+'px';
    p.style.height=(6+Math.random()*8)+'px';
    p.style.borderRadius=Math.random()>.5?'50%':'2px';
    p.style.animationDuration=(1.5+Math.random()*2)+'s';
    p.style.animationDelay=(Math.random()*.8)+'s';
    wrap.appendChild(p);
  }
}

// ── STORAGE ────────────────────────────────────────────────────────────────
function getLog(){return JSON.parse(localStorage.getItem('milenio_log')||'[]');}
function saveLog(log){localStorage.setItem('milenio_log',JSON.stringify(log));}

function registerSpin(won){
  const now = new Date();
  const fecha = now.toLocaleDateString('es-AR');
  const hora  = now.toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});
  const entry = {
    won, ts:now.toISOString(),
    nombre:currentParticipant?currentParticipant.nombre:'-',
    genero:currentParticipant?currentParticipant.genero:'-',
    edad:  currentParticipant?currentParticipant.edad:'-',
    marca: currentParticipant?currentParticipant.marca:'-',
    variedad:currentParticipant?currentParticipant.variedad:'-',
  };
  const log=getLog();
  log.unshift(entry);
  saveLog(log);

  // Enviar a Google Sheets
  fetch('https://script.google.com/macros/s/AKfycbypfWJsbvpmvtLLtRlLAWMVkiHaWbetbEih1IDego_vWkCUpv5V_bwBGoROsV-40sWzZA/exec', {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      fecha,
      hora,
      nombre: entry.nombre,
      genero: entry.genero,
      edad:   entry.edad,
      marca:  entry.marca,
      variedad: entry.variedad,
      resultado: won ? 'Premio' : 'Sin premio'
    })
  }).catch(()=>{});

  currentParticipant=null;
}

// ── ADMIN PIN ──────────────────────────────────────────────────────────────
const ADMIN_PIN='1234';
let holdTimer=null;

document.getElementById('logoImg').addEventListener('mousedown',()=>{holdTimer=setTimeout(openPin,2000);});
document.getElementById('logoImg').addEventListener('mouseup',()=>clearTimeout(holdTimer));
document.getElementById('logoImg').addEventListener('touchstart',()=>{holdTimer=setTimeout(openPin,2000);});
document.getElementById('logoImg').addEventListener('touchend',()=>clearTimeout(holdTimer));

function openPin(){
  document.getElementById('pinInput').value='';
  document.getElementById('pinError').textContent='';
  document.getElementById('pinOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('pinInput').focus(),100);
}

document.getElementById('pinSubmitBtn').addEventListener('click',checkPin);
document.getElementById('pinInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkPin();});
document.getElementById('pinCancelBtn').addEventListener('click',()=>document.getElementById('pinOverlay').classList.remove('show'));

function checkPin(){
  if(document.getElementById('pinInput').value===ADMIN_PIN){
    document.getElementById('pinOverlay').classList.remove('show');
    openAdmin();
  } else {
    document.getElementById('pinError').textContent='PIN incorrecto';
    document.getElementById('pinInput').value='';
  }
}

// ── ADMIN PANEL ────────────────────────────────────────────────────────────
function openAdmin(){
  refreshAdmin();
  document.getElementById('adminOverlay').classList.add('show');
}

document.getElementById('closeAdminBtn').addEventListener('click',()=>document.getElementById('adminOverlay').classList.remove('show'));

document.getElementById('resetBtn').addEventListener('click',()=>{
  if(confirm('¿Resetear todos los contadores?')){
    localStorage.removeItem('milenio_log');
    refreshAdmin();
  }
});

document.getElementById('exportBtn').addEventListener('click',exportCSV);

function refreshAdmin(){
  const log=getLog();
  const today=new Date().toDateString();
  document.getElementById('sTotal').textContent=log.length;
  document.getElementById('sPremios').textContent=log.filter(e=>e.won).length;
  document.getElementById('sHoy').textContent=log.filter(e=>e.won&&new Date(e.ts).toDateString()===today).length;

  const el=document.getElementById('adminLog');
  if(!log.length){el.innerHTML='<div style="color:rgba(255,255,255,.3);font-size:12px;text-align:center;padding:20px 0">Sin registros</div>';return;}
  el.innerHTML=log.slice(0,100).map(e=>{
    const d=new Date(e.ts);
    const fecha=d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'});
    const hora=d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    return '<div class="log-item"><div style="display:flex;justify-content:space-between"><span class="'+(e.won?'log-prize':'log-lose')+'">'+(e.won?'🎁 Premio':'— Sin premio')+'</span><span class="log-time">'+fecha+' '+hora+'</span></div><div style="font-size:11px;color:rgba(255,255,255,.45);margin-top:2px">'+(e.nombre||'-')+' · '+(e.genero||'-')+' · '+(e.edad||'-')+' años · '+(e.marca||'-')+(e.variedad&&e.variedad!=='-'?' '+e.variedad:'')+'</div></div>';
  }).join('');
}

function exportCSV(){
  const log=getLog();
  if(!log.length){alert('No hay registros todavia.');return;}
  const rows=[['Fecha','Hora','Nombre','Genero','Edad','Marca','Variedad','Resultado']];
  log.forEach(e=>{
    const d=new Date(e.ts);
    rows.push([
      d.toLocaleDateString('es-AR'),
      d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}),
      e.nombre||'-', e.genero||'-', e.edad||'-', e.marca||'-', e.variedad||'-',
      e.won?'Premio':'Sin premio'
    ]);
  });
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='milenio_ruleta_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
</script>
